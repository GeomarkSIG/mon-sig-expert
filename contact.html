<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demande de Devis — Geomark-SIG</title>
    <style>
        :root {
            --blue: #1a73e8; --blue-dark: #1557b0; --blue-light: #e8f0fe;
            --green: #1e8449; --green-light: #d5f5e3;
            --gray-bg: #f4f6f9; --gray-border: #dde2eb;
            --text: #202124; --text-muted: #5f6368;
            --radius: 12px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--gray-bg); color: var(--text); line-height: 1.6; }
        .page { max-width: 680px; margin: 40px auto; padding: 0 16px 60px; }

        .header { text-align: center; margin-bottom: 30px; }
        .header .badge { display: inline-block; background: var(--blue-light); color: var(--blue); font-size: 0.75rem; font-weight: 700; text-transform: uppercase; padding: 4px 14px; border-radius: 20px; margin-bottom: 14px; }
        .header h1 { font-size: 1.8rem; font-weight: 700; color: var(--blue); }

        .card { background: #fff; border-radius: var(--radius); border: 1px solid var(--gray-border); padding: 30px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        
        .recap-box { background: var(--blue-light); border-left: 4px solid var(--blue); padding: 15px; border-radius: 8px; margin-bottom: 25px; }
        .recap-box h3 { font-size: 0.9rem; margin-bottom: 5px; color: var(--blue-dark); }
        .recap-box p { font-size: 1.1rem; font-weight: bold; margin: 0; }

        .field { margin-bottom: 20px; }
        label { display: block; font-size: 0.9rem; font-weight: 600; margin-bottom: 8px; }
        input, textarea, select { 
            width: 100%; padding: 12px; border: 1.5px solid var(--gray-border); border-radius: 8px; 
            font-size: 1rem; font-family: inherit; transition: 0.3s;
        }
        input:focus, textarea:focus { border-color: var(--blue); outline: none; box-shadow: 0 0 0 3px rgba(26,115,232,0.1); }
        input[readonly] { background: #f1f3f4; cursor: not-allowed; }

        .btn-submit { 
            width: 100%; padding: 16px; background: var(--blue); color: white; 
            border: none; border-radius: 8px; font-size: 1.1rem; font-weight: bold; 
            cursor: pointer; transition: 0.3s; margin-top: 10px;
        }
        .btn-submit:hover { background: var(--blue-dark); transform: translateY(-2px); }

        .back-link { text-align: center; margin-top: 25px; }
        .back-link a { color: var(--text-muted); text-decoration: none; font-size: 0.9rem; }
        .back-link a:hover { color: var(--blue); text-decoration: underline; }
    </style>
</head>
<body>

<div class="page">
    <div class="header">
        <div class="badge">📩 Geomark-SIG</div>
        <h1>Finaliser mon projet SIG</h1>
        <p>Recevez votre devis personnalisé sous 24h.</p>
    </div>

    <div class="card">
        <div class="recap-box">
            <h3>Estimation de votre architecture :</h3>
            <p id="recapBudget">-- € / an</p>
        </div>

        <form action="https://formspree.io/f/https://formspree.io/f/mkoywdpd" method="POST">
            
            <div class="field">
                <label>Nom ou Entreprise</label>
                <input type="text" name="entreprise" id="dispNom" readonly>
            </div>

            <div class="field">
                <label>Email professionnel</label>
                <input type="email" name="_replyto" id="dispEmail" readonly>
            </div>

            <div class="field">
                <label>Téléphone (pour vous rappeler)</label>
                <input type="tel" name="telephone" placeholder="Ex: 06 92 XX XX XX">
            </div>

            <div class="field">
                <label>Type de prestation</label>
                <select name="prestation">
                    <option value="Installation">Installation & Configuration</option>
                    <option value="Formation">Formation (QGIS/PostGIS)</option>
                    <option value="Audit">Audit & Conseil</option>
                    <option value="Developpement">Développement Web-SIG</option>
                </select>
            </div>

            <div class="field">
                <label>Message ou précisions</label>
                <textarea name="message" placeholder="Décrivez votre besoin spécifique ici..."></textarea>
            </div>

            <input type="hidden" name="budget_estime" id="hiddenBudget">
            <input type="hidden" name="_subject" value="Nouvelle demande de devis SIG">

            <button type="submit" class="btn-submit">📤 Envoyer ma demande</button>
        </form>
    </div>

    <div class="back-link">
        <a href="index.html">← Modifier mon diagnostic</a>
    </div>
</div>

<script>
    // Récupération des paramètres de l'URL (venant de resultats.html)
    const params = new URLSearchParams(window.location.search);
    
    const nom = params.get('identite') || "Non précisé";
    const email = params.get('email') || "";
    const budget = params.get('total') || "0";

    // Affichage dans le formulaire
    document.getElementById('dispNom').value = nom;
    document.getElementById('dispEmail').value = email;
    document.getElementById('recapBudget').innerText = budget + " € / an";
    
    // Remplissage du champ caché pour le mail
    document.getElementById('hiddenBudget').value = budget + " € / an";
</script>

</body>
</html>
