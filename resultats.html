<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Résultat du Diagnostic SIG - GeomarkSIG</title>
    <style>
        :root { --primary: #1a73e8; --success: #28a745; --dark: #202124; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f8f9fa; color: var(--dark); line-height: 1.6; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); }
        .header { text-align: center; border-bottom: 2px solid #eee; margin-bottom: 30px; padding-bottom: 20px; }
        h1 { color: var(--primary); margin-bottom: 10px; }
        .user-welcome { font-size: 1.2rem; color: #5f6368; font-weight: bold; }
        .result-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 30px; }
        @media (max-width: 600px) { .result-grid { grid-template-columns: 1fr; } }
        .brique { padding: 20px; border-radius: 10px; border: 1px solid #e0e0e0; background: #fff; transition: transform 0.2s; position: relative; }
        .brique:hover { transform: translateY(-5px); box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .brique h3 { margin-top: 0; color: var(--success); border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .tag { background: #e8f0fe; color: var(--primary); padding: 4px 10px; border-radius: 5px; font-size: 0.8rem; font-weight: bold; text-transform: uppercase; margin-bottom: 10px; display: inline-block; }
        .footer { text-align: center; margin-top: 40px; padding-top: 20px; border-top: 1px solid #eee; }
        .btn-print { background: var(--primary); color: white; padding: 12px 25px; text-decoration: none; border-radius: 8px; font-weight: bold; cursor: pointer; border: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="tag">Diagnostic Expert</div>
        <h1>Votre Architecture SIG Idéale</h1>
        <p class="user-welcome" id="userName">Analyse en cours...</p>
    </div>

    <div id="resultatsList" class="result-grid">
        </div>

    <div class="footer">
        <p>Ce diagnostic a été généré en fonction de vos contraintes de budget, de souveraineté et d'expertise technique.</p>
        <button onclick="window.print()" class="btn-print">Télécharger le compte-rendu (PDF)</button>
        <br><br>
        <a href="index.html" style="color: #666;">Modifier mes réponses</a>
    </div>
</div>

<script>
    // 1. Récupération des données de l'URL
    const params = new URLSearchParams(window.location.search);
    const nom = params.get('identite') || "Cher Partenaire";
    const mode = params.get('mode');
    
    document.getElementById('userName').innerText = `Préconisations pour : ${nom}`;

    // 2. Initialisation des scores pour chaque catégorie
    let scores = {
        logiciel: { qgis: 0, arcgis_pro: 0 },
        base: { gpkg: 0, postgis: 0, arcgis_cloud: 0 },
        infra: { local: 0, vps: 0, cloud_us: 0, render: 0 },
        web: { felt: 0, lizmap: 0, leaflet: 0, arcgis_api: 0 },
        terrain: { qfield: 0, kobo: 0, fieldmaps: 0, aucun: 0 },
        image: { osm: 0, google: 0, ign: 0, drone: 0 }
    };

    // 3. LOGIQUE DE CALCUL (MATRICE)
    
    // --- Socle Commun (Mode Simple & Avancé) ---
    const budget = params.get('budget');
    const besoin = params.get('besoin');

    if (budget === 'zero') {
        scores.logiciel.qgis += 200;
        scores.infra.render += 150;
        scores.logiciel.arcgis_pro -= 1000;
    } else {
        scores.logiciel.arcgis_pro += 200;
        scores.infra.cloud_us += 150;
    }

    if (besoin === 'terrain') scores.terrain.qfield += 100;
    if (besoin === 'web') scores.web.felt += 100;

    // --- Logique Mode Avancé ---
    if (mode === 'avance') {
        const expertise = params.get('expertise');
        const souverain = params.get('souverainete');
        const volume = params.get('volume');

        if (expertise === 'expert') {
            scores.base.postgis += 200;
            scores.web.lizmap += 150;
            scores.infra.vps += 150;
        } else {
            scores.web.felt += 200;
            scores.base.arcgis_cloud += 100;
        }

        if (souverain === 'oui') {
            scores.infra.local += 500;
            scores.infra.cloud_us -= 1000;
            scores.infra.render -= 500; // Car serveurs souvent hors UE
        }

        if (volume === 'lourd') {
            scores.base.postgis += 300;
            scores.base.gpkg -= 500;
        }
    }

    // 4. FONCTION POUR TROUVER LE GAGNANT D'UNE CATÉGORIE
    function getWinner(category) {
        return Object.keys(scores[category]).reduce((a, b) => scores[category][a] > scores[category][b] ? a : b);
    }

    const architecture = {
        log: getWinner('logiciel'),
        base: getWinner('base'),
        infra: getWinner('infra'),
        web: getWinner('web'),
        terrain: getWinner('terrain')
    };

    // 5. CONTENU DES BRIQUES (DESCRIPTION)
    const briquesData = {
        qgis: { t: "Logiciel Desktop", n: "QGIS", d: "Logiciel SIG libre le plus complet. Idéal pour l'analyse spatiale avancée sans frais de licence." },
        arcgis_pro: { t: "Logiciel Desktop", n: "ArcGIS Pro", d: "Standard industriel offrant une puissance de traitement et un support professionnel inégalés." },
        gpkg: { t: "Stockage", n: "GeoPackage", d: "Format de fichier moderne et léger. Parfait pour le travail individuel et la portabilité des données." },
        postgis: { t: "Base de Données", n: "PostgreSQL / PostGIS", d: "Moteur spatial haute performance. Indispensable pour le travail en équipe et les gros volumes." },
        arcgis_cloud: { t: "Stockage Cloud", n: "ArcGIS Online", d: "Données hébergées en SaaS. Zéro maintenance serveur, sécurité et partage simplifiés." },
        local: { t: "Infrastructure", n: "Serveur Local", d: "Souveraineté totale. Vos données restent physiquement dans vos locaux ou sur votre PC." },
        vps: { t: "Infrastructure", n: "VPS (Type OVH)", d: "Serveur dédié virtuel en Europe. Équilibre parfait entre coût, liberté et souveraineté." },
        cloud_us: { t: "Infrastructure", n: "Cloud (Azure/AWS)", d: "Puissance de calcul mondiale et scalabilité infinie pour les projets d'envergure." },
        render: { t: "Infrastructure", n: "Cloud Managé (Render)", d: "Solution moderne pour héberger vos bases de données spatiales à moindre coût." },
        felt: { t: "Diffusion Web", n: "Felt", d: "L'outil web-sig le plus rapide pour partager et collaborer sur des cartes en ligne sans coder." },
        lizmap: { t: "Diffusion Web", n: "Lizmap", d: "Publiez vos projets QGIS sur le web en gardant toute votre symbologie et vos formulaires métier." },
        leaflet: { t: "Diffusion Web", n: "Leaflet.js", d: "Bibliothèque légère pour développeurs souhaitant intégrer des cartes sur mesure." },
        arcgis_api: { t: "Diffusion Web", n: "Esri Experience Builder", d: "Créez des applications web sophistiquées entièrement intégrées à votre écosystème ArcGIS." },
        qfield: { t: "Solution Terrain", n: "QField", d: "L'extension terrain de QGIS. Synchronisation fluide pour la saisie GPS et les inspections." },
        kobo: { t: "Solution Terrain", n: "KoboToolbox", d: "Standard de la collecte de données par formulaire. Idéal pour les enquêtes et recensements." },
        fieldmaps: { t: "Solution Terrain", n: "ArcGIS Field Maps", d: "Application mobile pro pour la mise à jour des données en temps réel sur le terrain." },
        aucun: { t: "Solution Terrain", n: "Non requis", d: "Votre projet ne nécessite pas d'application mobile spécifique." }
    };

    // 6. INJECTION DANS LA PAGE
    const container = document.getElementById('resultatsList');

    Object.values(architecture).forEach(key => {
        if(key === "aucun") return;
        const data = briquesData[key];
        const html = `
            <div class="brique">
                <div class="tag">${data.t}</div>
                <h3>${data.n}</h3>
                <p>${data.d}</p>
            </div>
        `;
        container.innerHTML += html;
    });

</script>

</body>
</html>
