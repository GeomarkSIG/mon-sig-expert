<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configurateur SIG Expert — GeomarkSIG</title>
    <style>
        :root {
            --primary: #1a73e8; --primary-dark: #1557b0;
            --secondary: #f39c12; --bg: #f8f9fa;
            --text: #202124; --border: #dadce0;
        }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); color: var(--text); line-height: 1.5; margin: 0; }
        .container { max-width: 850px; margin: 40px auto; background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
        
        .header { text-align: center; margin-bottom: 40px; border-bottom: 3px solid var(--primary); padding-bottom: 20px; }
        .header h1 { margin: 0; color: var(--primary); font-size: 2rem; }
        
        .section-title { background: #e8f0fe; padding: 10px 15px; border-radius: 6px; color: var(--primary-dark); font-weight: bold; margin: 25px 0 15px 0; display: flex; align-items: center; }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        @media (max-width: 600px) { .grid { grid-template-columns: 1fr; } }
        
        .field { margin-bottom: 20px; }
        label { display: block; font-weight: 600; margin-bottom: 8px; font-size: 0.95rem; }
        select, input { width: 100%; padding: 12px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 1rem; transition: border 0.3s; }
        select:focus, input:focus { border-color: var(--primary); outline: none; }
        
        .mode-toggle { display: flex; justify-content: center; gap: 10px; margin-bottom: 30px; }
        .btn-mode { padding: 10px 25px; border: 2px solid var(--primary); border-radius: 30px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-mode.active { background: var(--primary); color: white; }
        
        .expert-only { display: none; border-left: 4px solid var(--secondary); padding-left: 20px; }
        .expert-only.visible { display: block; animation: fadeIn 0.5s; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .btn-submit { width: 100%; padding: 18px; background: var(--primary); color: white; border: none; border-radius: 8px; font-size: 1.2rem; font-weight: bold; cursor: pointer; margin-top: 30px; transition: 0.3s; }
        .btn-submit:hover { background: var(--primary-dark); transform: scale(1.01); }
        
        .help-text { font-size: 0.8rem; color: #70757a; margin-top: 4px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>🗺️ Diagnostic SIG Geomark</h1>
        <p>Expertise multicritères pour architectures complexes</p>
    </div>

    <form action="resultats.html" method="GET">
        <div class="grid">
            <div class="field">
                <label>Nom / Entreprise</label>
                <input type="text" name="identite" placeholder="Ex: Cabinet Topo Géo" required>
            </div>
            <div class="field">
                <label>Email professionnel</label>
                <input type="email" name="email" placeholder="contact@domaine.com" required>
            </div>
        </div>

        <div class="mode-toggle">
            <div id="btnSimple" class="btn-mode active" onclick="toggleMode('simple')">Mode Standard</div>
            <div id="btnExpert" class="btn-mode" onclick="toggleMode('expert')">Mode Expert Professionnel</div>
        </div>
        <input type="hidden" name="mode" id="inputMode" value="simple">

        <div class="section-title">💼 Profil & Domaine d'activité</div>
        <div class="grid">
            <div class="field">
                <label>Votre secteur :</label>
                <select name="secteur">
                    <option value="collectivite">Collectivité Territoriale</option>
                    <option value="geometre">Géomètre / Topographe (AutoCAD/Mensura)</option>
                    <option value="bet">Bureau d'études Environnement / VRD</option>
                    <option value="ong">Humanitaire / Santé / ONG</option>
                    <option value="energie">Énergie / Réseaux (Smart Grids)</option>
                    <option value="ne_sait_pas">Je ne sais pas / Autre</option>
                </select>
            </div>
            <div class="field">
                <label>Budget annuel estimé :</label>
                <select name="budget">
                    <option value="zero">0€ (Logiciels libres uniquement)</option>
                    <option value="starter_free">Starter (Hébergement Render Free / SaaS gratuit)</option>
                    <option value="inter_pro">Intermédiaire (1000€ - 5000€)</option>
                    <option value="entreprise">Entreprise / Grand Compte (+10k€)</option>
                </select>
            </div>
        </div>

        <div class="section-title">📊 Données & Volume</div>
        <div class="grid">
            <div class="field">
                <label>Poids des données (Entités) :</label>
                <select name="volume">
                    <option value="leger">< 10 000 objets</option>
                    <option value="moyen">10 000 à 500 000 objets</option>
                    <option value="lourd">Big Data (+ 1 million / LIDAR / Rasters)</option>
                </select>
            </div>
            <div class="field">
                <label>Collaboration souhaitée :</label>
                <select name="collaboration">
                    <option value="solo">Utilisateur unique</option>
                    <option value="multi_2_5">Petite équipe (2-5 éditeurs)</option>
                    <option value="multi_10">Déploiement large (+10 éditeurs simultanés)</option>
                </select>
            </div>
        </div>

        <div id="expertContent" class="expert-only">
            <div class="section-title">⚡ Architecture & Souveraineté (Avancé)</div>
            <div class="grid">
                <div class="field">
                    <label>Architecture SI existante :</label>
                    <select name="si_existant">
                        <option value="aucun">Aucun (On part de zéro)</option>
                        <option value="azure">Cloud Microsoft Azure</option>
                        <option value="aws">Amazon Web Services (AWS)</option>
                        <option value="google">Google Cloud Platform</option>
                        <option value="on_premise">Serveurs Physiques Internes</option>
                    </select>
                </div>
                <div class="field">
                    <label>Exigence Souveraineté :</label>
                    <select name="souverainete">
                        <option value="faible">Standard (Hébergement mondial OK)</option>
                        <option value="haute">Haute (Hébergement France / Europe requis)</option>
                        <option value="critique">Critique (Intranet / Air-gapped)</option>
                    </select>
                </div>
                <div class="field">
                    <label>Diffusion Web souhaitée :</label>
                    <select name="diffusion">
                        <option value="simple">Carte simple (Felt / Leaflet)</option>
                        <option value="pro_lizmap">Portail Métier complet (Lizmap / MapServer)</option>
                        <option value="esri_builder">Esri Experience Builder / Dashboards</option>
                        <option value="bi_spatial">BI Spatiale (Superset / PowerBI)</option>
                    </select>
                </div>
                <div class="field">
                    <label>Système de Projection (CRS) :</label>
                    <select name="crs">
                        <option value="wgs84">WGS 84 (Mondial / Web)</option>
                        <option value="lambert93">Lambert 93 (France Métropole)</option>
                        <option value="reunion">RGR92 / UTM 40S (La Réunion)</option>
                        <option value="autre">Autre spécifique</option>
                    </select>
                </div>
            </div>

            <div class="section-title">🛰️ Acquisition Terrain & Imagerie</div>
            <div class="grid">
                <div class="field">
                    <label>Fond de plan prioritaire :</label>
                    <select name="imagerie">
                        <option value="osm">OpenStreetMap (Gratuit)</option>
                        <option value="google">Google Maps Satellite (API)</option>
                        <option value="ign">IGN Ortho HD / Flux WMTS</option>
                        <option value="drone">Orthophoto Drone (Besoin local)</option>
                    </select>
                </div>
                <div class="field">
                    <label>Outil de saisie mobile :</label>
                    <select name="terrain">
                        <option value="non">Pas de besoin terrain</option>
                        <option value="kobo">Formulaires socio/éco (KoboCollect)</option>
                        <option value="qfield">SIG Pro Déconnecté (QField)</option>
                        <option value="fieldmaps">Solution Esri (Field Maps)</option>
                    </select>
                </div>
            </div>
        </div>

        <button type="submit" class="btn-submit">🚀 Générer l'Architecture Optimale</button>
    </form>
</div>

<script>
    function toggleMode(mode) {
        const expertContent = document.getElementById('expertContent');
        const inputMode = document.getElementById('inputMode');
        const btnS = document.getElementById('btnSimple');
        const btnE = document.getElementById('btnExpert');

        if (mode === 'expert') {
            expertContent.classList.add('visible');
            inputMode.value = 'expert';
            btnE.classList.add('active');
            btnS.classList.remove('active');
        } else {
            expertContent.classList.remove('visible');
            inputMode.value = 'simple';
            btnS.classList.add('active');
            btnE.classList.remove('active');
        }
    }
</script>
</body>
</html>
